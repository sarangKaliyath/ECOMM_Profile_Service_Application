spring.application.name=ECOMM_Profile_Service_Application
# for database connection
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/shop_easy_profile_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
server.port=8087
jwt.secret=very-secure-and-very-long-secret-key-at-least-32-chars-long
# Register this microservice with the Eureka Server.
# allowing other services to discover and call it by service name.
eureka.client.register-with-eureka=true
# URL of the Eureka Server where this service will register itself.
# /eureka/ is the default endpoint exposed by the Eureka Server.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/